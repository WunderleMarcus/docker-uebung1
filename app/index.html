<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Python Docker App</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;

            font-family:
                Arial,
                Helvetica,
                sans-serif;

            background:
                linear-gradient(
                    135deg,
                    #0f172a,
                    #1e293b
                );

            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 900px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);

            border: 1px solid rgba(255, 255, 255, 0.2);

            border-radius: 24px;

            padding: 50px;

            backdrop-filter: blur(15px);

            box-shadow:
                0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .badge {
            display: inline-block;

            padding: 8px 14px;

            border-radius: 50px;

            background: #22c55e;

            color: #052e16;

            font-weight: bold;

            font-size: 14px;
        }

        h1 {
            font-size: 48px;

            margin-top: 25px;

            margin-bottom: 15px;
        }

        p {
            color: #cbd5e1;

            font-size: 18px;

            line-height: 1.6;
        }

        .info-grid {
            display: grid;

            grid-template-columns:
                repeat(
                    auto-fit,
                    minmax(180px, 1fr)
                );

            gap: 20px;

            margin-top: 35px;
        }

        .info-box {
            padding: 20px;

            border-radius: 16px;

            background: rgba(255, 255, 255, 0.08);
        }

        .info-box strong {
            display: block;

            font-size: 14px;

            color: #94a3b8;

            margin-bottom: 8px;
        }

        .info-box span {
            font-size: 18px;

            font-weight: bold;
        }

        .button {
            display: inline-block;

            margin-top: 30px;

            padding: 14px 24px;

            border-radius: 12px;

            background: #38bdf8;

            color: #082f49;

            text-decoration: none;

            font-weight: bold;

            transition: 0.2s;
        }

        .button:hover {
            transform: translateY(-2px);

            background: #7dd3fc;
        }

        footer {
            margin-top: 30px;

            color: #64748b;

            font-size: 14px;
        }
    </style>
</head>

<body>

    <main class="container">

        <section class="card">

            <span class="badge">
                ● System Online
            </span>

            <h1>
                Python Docker App
            </h1>

            <p>
                Willkommen in deiner containerisierten Python-Anwendung.
                Diese Webseite wird direkt aus einem Docker-Container
                ausgeliefert.
            </p>

            <div class="info-grid">

                <div class="info-box">
                    <strong>PLATFORM</strong>
                    <span>Python</span>
                </div>

                <div class="info-box">
                    <strong>DEPLOYMENT</strong>
                    <span>Docker</span>
                </div>

                <div class="info-box">
                    <strong>STATUS</strong>
                    <span>Online</span>
                </div>

            </div>

            <a
                class="button"
                href="/health"
            >
                Health Check öffnen
            </a>

            <footer>
                Deine erste containerisierte Webanwendung 
            </footer>

        </section>

    </main>

</body>
</html>
